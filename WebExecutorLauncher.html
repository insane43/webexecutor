<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scythe Web Executor - Launch</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-primary: #c0c0c0;
            --accent-secondary: #808080;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .background-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(192, 192, 192, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(192, 192, 192, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .launcher {
            text-align: center;
            padding: 60px 40px;
            max-width: 700px;
            z-index: 1;
            position: relative;
        }

        .logo-container {
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(192, 192, 192, 0.3);
            margin-bottom: 20px;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
        }

        .launcher h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .launcher .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .launcher p {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.7;
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-primary);
            box-shadow: 0 6px 20px rgba(192, 192, 192, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(192, 192, 192, 0.4);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--accent-secondary);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-primary);
            transform: translateY(-3px);
        }


        @media (max-width: 768px) {
            .launcher {
                padding: 40px 20px;
            }

            .launcher h1 {
                font-size: 36px;
            }

            .logo {
                width: 100px;
                height: 100px;
            }

            .logo svg {
                width: 60px;
                height: 60px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }

        .version-badge {
            display: inline-block;
            padding: 6px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--accent-secondary);
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    
    <div class="launcher">
        <div class="logo-container">
            <div class="logo">
                <img src="scythe_logo.png" alt="Scythe Logo">
            </div>
        </div>

        <div class="version-badge">
            <i class="fas fa-bolt"></i> v1.0 Web Edition
        </div>

        <h1>Scythe Executor</h1>
        <div class="subtitle">Web-Based Script Execution</div>
        <p>Experience powerful script execution directly in your browser. Fast, reliable, and built for modern development.</p>
        
        <div class="button-group">
            <button class="btn btn-primary" onclick="window.location.href='index'">
                <i class="fas fa-rocket"></i>
                Launch Executor
            </button>
        </div>
    </div>

    <script>
        // Apply saved theme on page load
        (function() {
            const savedSettings = localStorage.getItem('scytheSettings');
            if (savedSettings) {
                try {
                    const settings = JSON.parse(savedSettings);
                    if (settings.theme) {
                        document.documentElement.setAttribute('data-theme', settings.theme);
                    }
                } catch (e) {
                    console.error('Failed to load theme settings');
                }
            }
        })();
    </script>
</body>
</html>
